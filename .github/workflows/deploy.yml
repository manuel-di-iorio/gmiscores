name: Deploy via FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Altervista
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp -c "
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }}
            mirror -R \
              --exclude .git/ \
              --exclude .github/ \
              --exclude .gitignore \
              --exclude lib/config.php \
              --exclude .vscode/ \
              ./ ./
            quit
          "
