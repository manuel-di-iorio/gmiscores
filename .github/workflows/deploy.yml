name: Deploy via FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Altervista
        env:
          LFTP_PASSWORD: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp --env-password -u ${{ secrets.FTP_USER }} -e "mirror -R --delete --exclude .git/ --exclude .github/ --exclude .gitignore --exclude .env --exclude .vscode/ ./ ./; quit" ${{ secrets.FTP_HOST }}
