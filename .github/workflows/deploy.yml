name: Deploy to Altervista

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Forza deploy completo (init)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy via git-ftp
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # Download git-ftp
          GIT_FTP_URL=https://raw.githubusercontent.com/git-ftp/git-ftp/1.6.0/git-ftp
          curl --silent --show-error "$GIT_FTP_URL" > git-ftp.sh
          chmod +x git-ftp.sh

          # Exclude patterns
          printf '%s\n' '.git*' '.github/' '.env' '.gitignore' '.vscode/' '.ftpquota' 'sdk/' > .git-ftp-ignore

          FTP_URL="ftp://ftp.gmicloud.altervista.org/"

          # Check if this is a fresh deploy or an update
          LAST_COMMIT=$(curl --silent --user "${FTP_USER}:${FTP_PASS}" \
            "${FTP_URL}.git-ftp.log" || true)

          if [[ "${{ inputs.force_full }}" == "true" ]]; then
            echo "Deploy completo forzato"
            ./git-ftp.sh push -vv -a --user "$FTP_USER" --passwd "$FTP_PASS" "$FTP_URL"
          elif [[ -z "$LAST_COMMIT" ]]; then
            echo "Nuovo deploy completo"
            ./git-ftp.sh init -vv --user "$FTP_USER" --passwd "$FTP_PASS" "$FTP_URL"
          else
            echo "Deploy incrementale (ultimo commit: $LAST_COMMIT)"
            ./git-ftp.sh push -vv --user "$FTP_USER" --passwd "$FTP_PASS" "$FTP_URL"
          fi
