name: Deploy via FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Altervista
        env:
          LFTP_PASSWORD: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          lftp -c "
            open -u ${{ secrets.FTP_USER }},\$LFTP_PASSWORD ${{ secrets.FTP_HOST }}
            mirror -R --delete \
              --exclude .git/ \
              --exclude .github/ \
              --exclude .gitignore \
              --exclude .env \
              --exclude .vscode/ \
              ./ ./
            quit
          "
